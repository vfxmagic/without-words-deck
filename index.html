      *{box-sizing:border-box;margin:0;padding:0}

      .staticrypt-html{height:100%}
      .staticrypt-body{height:100%;background:#f4f4f0}
      .staticrypt-content{height:100%;display:flex;align-items:center;justify-content:center;padding:24px}
      .gate-card{background:#fff;max-width:380px;width:100%;border-radius:4px;box-shadow:0 2px 24px rgba(0,0,0,.10);padding:40px 40px 36px;text-align:center}

      .pw-wrap input:focus{border-color:#3a3a3a}
      .toggle-vis{position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;opacity:.5;width:18px;height:18px}
      .staticrypt-remember{display:flex;align-items:center;gap:10px;font-size:13px;color:#555;margin-bottom:16px;justify-content:center}
      .staticrypt-remember input[type=checkbox]{transform:scale(1.3)}
      .submit-btn{width:100%;background:#1a1a1a;color:#fff;border:none;border-radius:3px;padding:12px;font-size:13px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;font-weight:600}
      .submit-btn:hover{background:#333}
      .hidden{display:none!important}
      .staticrypt-spinner-container{height:100%;display:flex;align-items:center;justify-content:center}
      .staticrypt-spinner{width:2rem;height:2rem;border:.25em solid #ccc;border-right-color:transparent;border-radius:50%;animation:spin .75s linear infinite}
      @keyframes spin{100%{transform:rotate(360deg)}}
